<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location | GYM SICK</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
    --yellow:#ffcc00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.85)),
               url("gym_web_1.jpg") center/cover no-repeat fixed;
    color:white;
    animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* ================= HEADER ================= */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#000;
    border-bottom:2px solid var(--yellow);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-family:'Oswald',sans-serif;
    font-size:28px;
    font-weight:bold;
}

.logo span{
    color:var(--yellow);
}

nav{
    transition:0.3s;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
    text-transform:uppercase;
    transition:0.3s;
}

nav a:hover{
    color:var(--yellow);
}

/* HAMBURGER */
.hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
}

.hamburger span{
    width:28px;
    height:3px;
    background:var(--yellow);
}

/* LOCATION SECTION  */
.location-section{
    padding:80px 8%;
    text-align:center;
}

.location-section h1{
    font-family:'Oswald',sans-serif;
    font-size:3rem;
    color:var(--yellow);
    margin-bottom:20px;
}

.location-section p{
    margin-bottom:40px;
}

/*  MAP  */
.map-container{
    width:100%;
    height:400px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(255,204,0,0.4);
    transition:0.4s;
}

.map-container:hover{
    transform:scale(1.02);
    box-shadow:0 0 50px rgba(255,204,0,0.6);
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

/* INFO CARD  */
.info-box{
    margin-top:40px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,204,0,0.2);
    transition:0.4s;
}

.info-box:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px rgba(255,204,0,0.3);
}

.info-box h3{
    color:var(--yellow);
    margin-bottom:15px;
}

/*DIRECTION BUTTON  */
.btn-direction{
    margin-top:20px;
    display:inline-block;
    padding:12px 30px;
    background:var(--yellow);
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    transition:0.3s;
}

.btn-direction:hover{
    background:white;
    transform:scale(1.05);
}

/*  WHATSAPP */
.floating-whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    animation:float 2s infinite ease-in-out;
    transition:0.3s;
}

.floating-whatsapp:hover{
    transform:scale(1.1);
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

    .hamburger{
        display:flex;
    }

    nav{
        position:absolute;
        top:70px;
        right:0;
        background:#000;
        width:220px;
        display:none;
        padding:20px;
        border-left:2px solid var(--yellow);
    }

    nav.active{
        display:flex;
    }

    nav ul{
        flex-direction:column;
        gap:20px;
    }

    .location-section h1{
        font-size:2rem;
    }

    .map-container{
        height:300px;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">GYM <span>SICK</span></div>

    <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav id="navMenu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="location.html" style="color:#ffcc00;">Location</a></li>
        </ul>
    </nav>
</header>

<section class="location-section">
    <h1>Our Location</h1>
    <p>Visit GYM SICK and start your fitness journey today 💪</p>

    <div class="map-container">
        <!-- Replace this with your real Google Map embed link -->
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3168.948145296163!2d-122.08424968469262!3d37.42206597982567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb24c2f4f5f1b%3A0x5c1d9a9b5c3d2e9!2sGoogleplex!5e0!3m2!1sen!2sus!4v1690000000000"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>

    <div class="info-box">
        <h3>Contact Information</h3>
        <p>📍 Address: Your Gym Address Here</p>
        <p>📞 Phone: +94 727610885</p>
        <p>🕒 Open: 6:00 AM - 10:00 PM</p>

        <a href="https://maps.google.com" target="_blank" class="btn-direction">
            Get Directions
        </a>
    </div>
</section>

<!-- Floating WhatsApp -->
<a href="https://wa.me/94727610885" target="_blank" class="floating-whatsapp">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
function toggleMenu(){
    document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html>
