<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM SICK</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Oswald', sans-serif;
    background:url("gym_web_1.jpg") center/cover no-repeat;
    min-height:100vh;
    color:white;
    position:relative;
}

/* Dark overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* ================= HEADER ================= */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
}

.logo{
    font-size:32px;
    font-weight:700;
}

.logo span:last-child{
    color:yellow;
}

/* ================= NAV ================= */
nav ul{
    display:flex;
    gap:30px;
    list-style:none;
    align-items:center;
}

nav a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:0.3s;
}

nav a:hover{
    color:yellow;
    transform:translateY(-3px);
}

/* ================= HAMBURGER ================= */
.hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
}

.hamburger span{
    width:25px;
    height:3px;
    background:white;
    transition:0.4s;
}

/* Hamburger animation */
.hamburger.active span:nth-child(1){
    transform:rotate(45deg) translateY(8px);
}
.hamburger.active span:nth-child(2){
    opacity:0;
}
.hamburger.active span:nth-child(3){
    transform:rotate(-45deg) translateY(-8px);
}

/* ================= HERO ================= */
.hero{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    height:80vh;
    padding:20px;
    animation:fadeIn 2s ease-in-out;
}

.hero h1{
    font-size:60px;
    color:#f4f809;
    text-shadow:2px 2px 10px black;
    margin-bottom:20px;
}

.hero p{
    max-width:600px;
    margin-bottom:30px;
    font-size:18px;
}

/* ================= BUTTONS ================= */
.buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.buttons button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:0.4s;
}

.btn-start{
    background:#3cee05;
    color:white;
}

.btn-call{
    background:#ee0d05;
    color:white;
}

.buttons button:hover{
    transform:translateY(-8px) scale(1.05);
}

/* ================= ANIMATION ================= */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* ================= RESPONSIVE ================= */

/* Tablet */
@media(max-width:992px){
    .hero h1{
        font-size:45px;
    }
}

/* Mobile */
@media(max-width:768px){

    .hamburger{
        display:flex;
    }

    nav ul{
        position:absolute;
        top:80px;
        right:8%;
        background:black;
        flex-direction:column;
        gap:15px;
        width:220px;
        padding:20px;
        display:none;
        border-radius:10px;
        animation:fadeIn 0.4s ease;
    }

    nav ul.active{
        display:flex;
    }

    .hero{
        height:auto;
        padding-top:80px;
    }

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:16px;
    }
}

/* Small mobile */
@media(max-width:480px){
    .hero h1{
        font-size:26px;
    }
}

</style>
</head>
<body>

<header>
    <div class="logo">
        GYM <span>SICK</span>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="location.html">Location</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>STRONGER EVERYONE</h1>
    <p>Build your dream body. Be healthy. Be strong. Gym Sick Gym is the best way to build your dream body.</p>

    <div class="buttons">
        <a href="form.html">
            <button class="btn-start">GET START</button>
        </a>
        <a href="tel:+94727610885">
            <button class="btn-call">CALL NOW</button>
        </a>
    </div>
</section>

<script>
function toggleMenu(){
    document.getElementById("navMenu").classList.toggle("active");
    document.querySelector(".hamburger").classList.toggle("active");
}
</script>

</body>
</html>
